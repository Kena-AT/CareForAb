name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Root Dependencies
        run: npm install

      - name: Lint Backend
        run: |
          cd backend
          npm install
          npm run lint

      - name: Lint Frontend
        run: |
          cd frontend
          npm install
          npm run lint

      - name: Build Check
        run: |
          cd backend && npm run build
          cd ../frontend && npm run build
